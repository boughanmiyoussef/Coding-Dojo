<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Button Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <!-- All the navbar in one div-->
            <nav>
                <h1> Dojonary</h1>
                <input type="text" placeholder="Search">
                <button>Login</button>
                </nav>
        <!--main section-->
        <main>
                <!--left column section-->
                <div class="leftcolumn"> 
                    <!--upper box-->
                        <div class="upperbox">
                                <div class="leftside">
                                    <h2>Ninja</h2>
                                    <p>Noun <br> Plural :Ninjas</p>
                                    <button onclick="alertme(this)" class="button">13 Like</button>                                
                                        <div class="rightside">
                                        <p>A practitioner skilled in the <span >Japanese</span> art of <span>ninjutsu</span>
                                        </div>
                                </div>
                        </div>
                        <!--lower box-->
                            <div class="lowerbox">
                                <div class="leftside"></div>
                                <h2>Ninja</h2>
                                <p>Noun <br> Plural:Ninjas </p>
                                <button class="button">37 likes</button>
                                <div></div>
                                <p> A <span>programmer</span> who breaks down problem with <span>zen</span>-like focus </p>
                            </div>
                </div>
                                            <!--right column section-->
                                            <div class="rightcolumn">
                                                <div class="leftbox">
                                                    <p>Dojonary is <br> defined by <span>You</span></p>
                                                    <button onclick="removeme(this)">Add Definition</button>
                                                </div>                                                
                                            </div>
        </main>


<script src="script.js"></script>    
</body>
</html>
